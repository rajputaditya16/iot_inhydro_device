<!doctype html>
<html lang="en" class="dark">
  <head>
    <!-- Basic Meta -->

    <!-- Primary SEO Metadata -->
    <title>InHydro | Smart IoT Hydroponics Monitoring & Automated Dosing</title>
    <meta name="title" content="InHydro | Smart IoT Hydroponics Monitoring & Automated Dosing" />

    <!-- Performance Optimization: Preconnect & DNS-Prefetch to External APIs and Fonts -->

    <link rel="preconnect" href="https://api.thingspeak.com" />

    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://api.thingspeak.com" />
    <link rel="dns-prefetch" href="https://iot-device-inhydro-backend.onrender.com" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
